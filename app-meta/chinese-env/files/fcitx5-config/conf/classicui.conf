# Classic User Interface configuration for Fcitx5
# Win11 Fluent look: horizontal candidate list, Win11 theme, CJK font

[Vertical Candidate List]
# Horizontal layout (Win11 style)
UseVertical=False

[Appearance]
# Use the Win11 Fluent theme
Theme=fcitx5-win11-theme
# Font for candidate list — Noto Sans CJK SC at 12pt
Font=Noto Sans CJK SC 12
# Font for tray menu
MenuFont=Noto Sans CJK SC 12
# Font for tray icon label
TrayFont=Sans Serif 10
# Scroll mode for candidates
ScrollMode=True
