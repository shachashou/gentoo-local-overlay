# Pinyin input method configuration
# Aligned with Microsoft Pinyin behavior

[Behavior]
# 5 candidates per page (matching MS Pinyin default)
PageSize=5
# Inline preedit: show composing text inline at cursor
PreeditMode=Compose
# Shift key toggles between Chinese and English mode
# Press Shift to temporarily switch to English, release to go back to Chinese
SwitchKey=Shift_L

[Paging]
# Use comma (,) and period (.) for page up/down (MS Pinyin convention)
PageUpKey=comma
PageDownKey=period

[Dict]
# Enable cloud pinyin for better word suggestions
CloudPinyin=True
