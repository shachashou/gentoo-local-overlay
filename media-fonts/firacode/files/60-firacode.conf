<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
	<!--
		Fira Code font family aliases.
		Register Fira Code as both monospace and sans-serif fallback.
	-->
	<alias>
		<family>monospace</family>
		<prefer>
			<family>Fira Code</family>
		</prefer>
	</alias>
	<alias>
		<family>Fira Code</family>
		<default>
			<family>monospace</family>
		</default>
	</alias>
</fontconfig>
