<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
	<!--
		Windows 11 Chinese Simplified font aliases.
		Prefer Microsoft YaHei for sans-serif, SimSun for serif.
	-->
	<!-- Sans-serif: Microsoft YaHei (微软雅黑) -->
	<alias>
		<family>sans-serif</family>
		<prefer>
			<family>Microsoft YaHei</family>
		</prefer>
	</alias>

	<!-- Serif: SimSun (宋体) -->
	<alias>
		<family>serif</family>
		<prefer>
			<family>SimSun</family>
		</prefer>
	</alias>

	<!-- Monospace: SimHei (黑体) -->
	<alias>
		<family>monospace</family>
		<prefer>
			<family>SimHei</family>
		</prefer>
	</alias>

	<!-- Fallback: ensure CJK characters render with Chinese fonts -->
	<alias>
		<family>sans-serif</family>
		<accept>
			<family>Microsoft YaHei</family>
			<family>SimHei</family>
			<family>KaiTi</family>
			<family>FangSong</family>
		</accept>
	</alias>
	<alias>
		<family>serif</family>
		<accept>
			<family>SimSun</family>
			<family>FangSong</family>
			<family>KaiTi</family>
		</accept>
	</alias>
	<alias>
		<family>monospace</family>
		<accept>
			<family>SimHei</family>
			<family>Microsoft YaHei</family>
		</accept>
	</alias>
</fontconfig>
