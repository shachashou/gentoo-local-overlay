masters = gentoo

# Manifest hashes — set both for maximum compatibility
manifest-hashes = BLAKE2B SHA512

# Thin Manifests: only contain DIST entries for files in SRC_URI.
# Files under files/ are NOT listed (they are covered by the VCS).
thin-manifests = true

# Use the same GPG signing behavior as ::gentoo
sign-manifests = false

# This is a developer/live overlay, allow commits without strict manifest checks
# (Manifests are still required but checks are relaxed during development)
cache-formats = md5-dict

# Completely disable Manifest requirement for this local overlay
use-manifests = false
